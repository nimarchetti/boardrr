services:
  train-display:
    build: .
    restart: unless-stopped
    # privileged gives the container access to SPI and GPIO hardware.
    # This is the simplest approach and works across all Pi models
    # (Pi Zero 2W, Pi 4, Pi 5/500) without needing to list individual
    # /dev/spidev* and /dev/gpiochip* paths, which differ between models.
    privileged: true
    # host networking is used for simplest hardware access on Raspberry Pi.
    # describrr endpoint/auth is configured in config.json (for example
    # https://describrr.foro.co.uk with apiKey). If you use rtt or
    # transportApi you can change this to
    # network_mode: bridge instead.
    network_mode: host
    volumes:
      - ./config.json:/app/config.json:ro
